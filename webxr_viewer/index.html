<!DOCTYPE html>
<html>
    <head>
        <title>SuperSplat</title>
        <meta charset="utf-8" />
        <base href="">
        <link rel="manifest" href="./manifest.json">
        <link rel="stylesheet" href="./index.css?v=20260501-webxr">
        <link rel="shortcut icon" href="#">
        <meta name="description" content="SuperSplat is an advanced browser-based editor for manipulating and optimizing 3D Gaussian Splats. It is open source and engine agnostic." />
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

        <!-- Disable service worker for local WebXR testing to avoid stale model/bundle caches. -->
        <script>
            const sw = navigator.serviceWorker;
            if (sw) {
                sw.getRegistrations()
                    .then(registrations => registrations.forEach(registration => registration.unregister()))
                    .catch(err => console.log('failed to unregister service worker', err));
            }

            const params = new URLSearchParams(window.location.search);
            if (!params.has('sequence') && !params.has('load')) {
                const basePath = new URL('.', window.location.href).pathname;
                const staticScene = `${basePath}scenes/case1_static_compressed/scene.compressed.ply`;
                const sequence = `${basePath}scenes/girl_ply_seq_sam3_rotx_y135_staticworld/sequence.json`;
                const next = new URL(window.location.href);
                next.searchParams.set('load', staticScene);
                next.searchParams.set('filename', 'case1_static_scene.compressed.ply');
                next.searchParams.set('sequence', sequence);
                window.location.replace(next.toString());
            }
        </script>
    </head>

    <body>
        <script type="module" src="./index.js?v=20260501-webxr2"></script>
    </body>
</html>
