name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - src/**
      - static/**
      - package*.json
      - rollup.config.mjs
      - copy-and-watch.mjs
      - tsconfig.json
      - webxr_viewer/scenes/**
      - .github/workflows/pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          BASE_HREF: /${{ github.event.repository.name }}/
          SKIP_SCENES_COPY: '1'

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v4
        with:
          path: webxr_viewer

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
